syntax = "proto3";

package inventoryreservation;

option java_multiple_files = true;
option java_package = "org.example.commoncontracts.grpc.reservation";
option java_outer_classname = "InventoryReservationProto";

service InventoryReservationService {
  rpc ReserveStockCar(ReserveStockCarRequest) returns (ReservationResponse);
  rpc ReserveConfiguration(ReserveConfigurationRequest) returns (ReservationResponse);
  rpc ConfirmReservation(ConfirmReservationRequest) returns (ReservationResponse);
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReservationResponse);
}

message ReserveStockCarRequest {
  string order_id = 1;
  string car_id = 2;
  string expires_at = 3;
  string trace_id = 4;
}

message ReserveConfigurationRequest {
  string order_id = 1;
  string model_id = 2;
  map<string, string> selected_part_ids = 3;
  string expires_at = 4;
  string trace_id = 5;
}

message ConfirmReservationRequest {
  string order_id = 1;
  string reservation_id = 2;
  string trace_id = 3;
}

message ReleaseReservationRequest {
  string order_id = 1;
  string reservation_id = 2;
  string reason = 3;
  string trace_id = 4;
}

message ReservationResponse {
  string reservation_id = 1;
  string order_id = 2;
  string order_type = 3;
  string status = 4;
  string expires_at = 5;
  string total_price = 6;
}
