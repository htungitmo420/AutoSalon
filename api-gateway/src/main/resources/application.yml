server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${APP_NAME:ApiGateway}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    discovery:
      client:
        health-indicator:
          enabled: false
        composite-indicator:
          enabled: false
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:20}
                redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:40}
                redis-rate-limiter.requestedTokens: 1
          routes:
            - id: auth
              uri: ${ORDER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/auth/**
            - id: public-catalog
              uri: ${STORAGE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/catalog/**,/api/v1/configurator/**
            - id: customer-orders
              uri: ${ORDER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/orders/**,/api/v1/test-drives/**
            - id: customer-cart
              uri: ${CART_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/cart/**
            - id: payments
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/payments/**
            - id: admin-inventory
              uri: ${STORAGE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/admin/inventory/**,/api/v1/admin/fulfillment/**
            - id: admin-orders
              uri: ${ORDER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/admin/orders/**,/api/v1/admin/test-drives/**

services:
  order:
    health-url: ${ORDER_SERVICE_HEALTH_URL:http://localhost:8080/actuator/health}
  storage:
    health-url: ${STORAGE_SERVICE_HEALTH_URL:http://localhost:8081/actuator/health}
  cart:
    health-url: ${CART_SERVICE_HEALTH_URL:http://localhost:8083/actuator/health}
  payment:
    health-url: ${PAYMENT_SERVICE_HEALTH_URL:http://localhost:8084/actuator/health}
  health-timeout-millis: ${DOWNSTREAM_HEALTH_TIMEOUT_MILLIS:1000}

security:
  jwt:
    issuer: ${JWT_ISSUER:auto-salon}
    audience: ${JWT_AUDIENCE:auto-salon-api}
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

management:
  health:
    discovery-composite:
      enabled: false
    reactive-discovery-clients:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"
