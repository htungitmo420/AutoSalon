server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:OrderService}

  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:54329}/${POSTGRESQL_DB:order_service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}
    properties:
      hibernate:
        default_schema: auto_salon
        show_sql: false
        format_sql: false
        jdbc.time_zone: UTC

  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
    change-log: classpath:db/db.changelog-master.yaml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:${spring.application.name}}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.example.commoncontracts.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

security:
  jwt:
    issuer: ${JWT_ISSUER:auto-salon}
    audience: ${JWT_AUDIENCE:auto-salon-api}
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
  auth:
    refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:2592000}
    refresh-cookie:
      name: ${AUTH_REFRESH_COOKIE_NAME:AUTO_SALON_REFRESH}
      path: ${AUTH_REFRESH_COOKIE_PATH:/api/auth}
      domain: ${AUTH_REFRESH_COOKIE_DOMAIN:}
      secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
      same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Strict}
    password:
      min-length: ${AUTH_PASSWORD_MIN_LENGTH:12}
    password-reset:
      token-ttl-seconds: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:900}
      # On production set delivery-enabled=true
      delivery-enabled: ${AUTH_PASSWORD_RESET_DELIVERY_ENABLED:false}
      frontend-url: ${AUTH_PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
      mail-from: ${AUTH_PASSWORD_RESET_MAIL_FROM:no-reply@autosalon.local}
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:900}
      block-seconds: ${AUTH_RATE_LIMIT_BLOCK_SECONDS:900}
    cleanup:
      retention-seconds: ${AUTH_CLEANUP_RETENTION_SECONDS:604800}
      fixed-delay-ms: ${AUTH_CLEANUP_FIXED_DELAY_MS:3600000}
    trusted-proxy:
      use-forwarded-for: ${AUTH_TRUSTED_PROXY_USE_FORWARDED_FOR:false}
    bootstrap:
      enabled: ${AUTH_BOOTSTRAP_ENABLED:${AUTH_BOOTSTRAP_ADMIN_ENABLED:false}}
      update-existing-users: ${AUTH_BOOTSTRAP_UPDATE_EXISTING_USERS:false}
      default-password: ${AUTH_BOOTSTRAP_PASSWORD:${AUTH_BOOTSTRAP_TEST_USERS_PASSWORD:${AUTH_BOOTSTRAP_ADMIN_PASSWORD:}}}
      users:
        - email: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:admin@autosalon.local}
          password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:}
          full-name: ${AUTH_BOOTSTRAP_ADMIN_FULL_NAME:Local Admin}
          roles:
            - USER
            - MANAGER
            - WAREHOUSE_ADMIN
            - ADMIN
        - email: ${AUTH_BOOTSTRAP_USER_EMAIL:user@autosalon.local}
          full-name: ${AUTH_BOOTSTRAP_USER_FULL_NAME:Local User}
          roles:
            - USER
        - email: ${AUTH_BOOTSTRAP_MANAGER_EMAIL:manager@autosalon.local}
          full-name: ${AUTH_BOOTSTRAP_MANAGER_FULL_NAME:Local Manager}
          roles:
            - MANAGER
        - email: ${AUTH_BOOTSTRAP_WAREHOUSE_EMAIL:warehouse@autosalon.local}
          full-name: ${AUTH_BOOTSTRAP_WAREHOUSE_FULL_NAME:Local Warehouse Admin}
          roles:
            - WAREHOUSE_ADMIN
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9094}
  client:
    storage-service:
      address: static://${STORAGE_GRPC_HOST:localhost}:${STORAGE_GRPC_PORT:9090}
      negotiationType: plaintext
    cart-service:
      address: static://${CART_GRPC_HOST:localhost}:${CART_GRPC_PORT:9091}
      negotiationType: plaintext

storage:
  grpc:
    timeout-millis: ${STORAGE_GRPC_TIMEOUT_MILLIS:2000}

cart:
  grpc:
    timeout-millis: ${CART_GRPC_TIMEOUT_MILLIS:2000}

kafka:
  retry:
    max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
    backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}
