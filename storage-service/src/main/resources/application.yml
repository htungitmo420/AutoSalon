server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${APP_NAME:StorageService}

  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:54330}/${POSTGRESQL_DB:storage_service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auto_salon
        show_sql: false
        format_sql: false
        jdbc.time_zone: UTC

  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
    change-log: classpath:db/db.changelog-master.yaml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:${spring.application.name}}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.example.commoncontracts.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

security:
  jwt:
    issuer: ${JWT_ISSUER:auto-salon}
    audience: ${JWT_AUDIENCE:auto-salon-api}
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

kafka:
  retry:
    max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
    backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}

storage:
  assets:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:auto-salon-catalog}
    region: ${MINIO_REGION:us-east-1}
    configure-cors: ${MINIO_CONFIGURE_BUCKET_CORS:false}
    max-size-bytes: ${CATALOG_ASSET_MAX_SIZE_BYTES:10485760}
    presigned-url-ttl-seconds: ${CATALOG_ASSET_URL_TTL_SECONDS:900}
