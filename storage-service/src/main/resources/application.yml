server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${APP_NAME:StorageService}

  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:54330}/${POSTGRESQL_DB:storage_service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auto_salon
        show_sql: false
        format_sql: false
        jdbc.time_zone: UTC

  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
    change-log: classpath:db/db.changelog-master.yaml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:${spring.application.name}}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.example.commoncontracts.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

security:
  jwt:
    issuer: ${JWT_ISSUER:auto-salon}
    audience: ${JWT_AUDIENCE:auto-salon-api}
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}
