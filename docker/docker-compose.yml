services:
  order-postgres:
    image: postgres:16-alpine
    container_name: auto_salon_order_db
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_service"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - order_service_data:/var/lib/postgresql/data

  storage-postgres:
    image: postgres:16-alpine
    container_name: auto_salon_storage_db
    environment:
      POSTGRES_DB: storage_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "54330:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storage_service"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - storage_service_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auto_salon_keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: 123456
    ports:
      - "8000:8080"
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import

  order-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE_MODULE: order-service
    container_name: auto_salon_order_service
    environment:
      SERVER_PORT: 8080
      POSTGRESQL_HOST: order-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: order_service
      DB_USER: postgres
      DB_PASSWORD: 123456
      JWT_ISSUER_URI: http://localhost:8000/realms/auto-salon
      JWT_JWK_SET_URI: http://keycloak:8080/realms/auto-salon/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STORAGE_GRPC_HOST: storage-service
      STORAGE_GRPC_PORT: 9090
      STORAGE_GRPC_TIMEOUT_MILLIS: 2000
    ports:
      - "8080:8080"
    depends_on:
      order-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

  storage-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE_MODULE: storage-service
    container_name: auto_salon_storage_service
    environment:
      SERVER_PORT: 8081
      POSTGRESQL_HOST: storage-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: storage_service
      DB_USER: postgres
      DB_PASSWORD: 123456
      JWT_ISSUER_URI: http://localhost:8000/realms/auto-salon
      JWT_JWK_SET_URI: http://keycloak:8080/realms/auto-salon/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9090
    ports:
      - "8081:8081"
      - "9090:9090"
    depends_on:
      storage-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: auto_salon_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: AylISgFhQUSeI1RpFZ_81g

volumes:
  order_service_data:
  storage_service_data:
