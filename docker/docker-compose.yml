x-spring-build: &spring-build
  context: ..
  dockerfile: docker/Dockerfile

x-healthcheck: &healthcheck
  interval: 5s
  timeout: 3s
  retries: 20
  start_period: 10s

x-spring-healthcheck: &spring-healthcheck
  <<: *healthcheck
  start_period: 30s

x-cart-env: &cart-env
  JWT_ISSUER: ${JWT_ISSUER:-auto-salon}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-auto-salon-api}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}

x-storage-env: &storage-env
  JWT_ISSUER: ${JWT_ISSUER:-auto-salon}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-auto-salon-api}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
  CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:-3600}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_RETRY_MAX_ATTEMPTS: ${KAFKA_RETRY_MAX_ATTEMPTS:-3}
  KAFKA_RETRY_BACKOFF_MS: ${KAFKA_RETRY_BACKOFF_MS:-1000}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}

x-order-env: &order-env
  <<: *storage-env

x-payment-env: &payment-env
  JWT_ISSUER: ${JWT_ISSUER:-auto-salon}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-auto-salon-api}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_RETRY_MAX_ATTEMPTS: ${KAFKA_RETRY_MAX_ATTEMPTS:-3}
  KAFKA_RETRY_BACKOFF_MS: ${KAFKA_RETRY_BACKOFF_MS:-1000}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}

x-notification-env: &notification-env
  <<: *payment-env

x-gateway-env: &gateway-env
  JWT_ISSUER: ${JWT_ISSUER:-auto-salon}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-auto-salon-api}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
  CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:-3600}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}

services:
  order-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD:?Set ORDER_DB_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_service"]
    volumes:
      - order_service_data:/var/lib/postgresql/data

  storage-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storage_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${STORAGE_DB_PASSWORD:?Set STORAGE_DB_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d storage_service"]
    volumes:
      - storage_service_data:/var/lib/postgresql/data

  cart-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cart_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CART_DB_PASSWORD:?Set CART_DB_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d cart_service"]
    volumes:
      - cart_service_data:/var/lib/postgresql/data

  payment-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_service"]
    volumes:
      - payment_service_data:/var/lib/postgresql/data

  notification-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?Set NOTIFICATION_DB_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_service"]
    volumes:
      - notification_service_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "redis-cli", "ping"]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    volumes:
      - minio_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: AylISgFhQUSeI1RpFZ_81g

  cart-service:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: cart-service
    environment:
      <<: *cart-env
      SERVER_PORT: 8083
      POSTGRESQL_HOST: cart-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: cart_service
      DB_USER: postgres
      DB_PASSWORD: ${CART_DB_PASSWORD:?Set CART_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GRPC_SERVER_PORT: 9091
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      cart-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  storage-service:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: storage-service
    environment:
      <<: *storage-env
      SERVER_PORT: 8081
      POSTGRESQL_HOST: storage-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: storage_service
      DB_USER: postgres
      DB_PASSWORD: ${STORAGE_DB_PASSWORD:?Set STORAGE_DB_PASSWORD}
      GRPC_SERVER_PORT: 9090
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-auto-salon-catalog}
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      storage-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy

  order-service:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: order-service
    environment:
      <<: *order-env
      SERVER_PORT: 8080
      POSTGRESQL_HOST: order-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: order_service
      DB_USER: postgres
      DB_PASSWORD: ${ORDER_DB_PASSWORD:?Set ORDER_DB_PASSWORD}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-AUTO_SALON_REFRESH}
      AUTH_REFRESH_COOKIE_PATH: ${AUTH_REFRESH_COOKIE_PATH:-/api/auth}
      AUTH_REFRESH_COOKIE_DOMAIN: ${AUTH_REFRESH_COOKIE_DOMAIN:-}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-false}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE:-Strict}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-12}
      AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:-900}
      AUTH_PASSWORD_RESET_DELIVERY_ENABLED: ${AUTH_PASSWORD_RESET_DELIVERY_ENABLED:-false}
      AUTH_PASSWORD_RESET_FRONTEND_URL: ${AUTH_PASSWORD_RESET_FRONTEND_URL:-http://localhost:5173/reset-password}
      AUTH_PASSWORD_RESET_MAIL_FROM: ${AUTH_PASSWORD_RESET_MAIL_FROM:-no-reply@autosalon.local}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-5}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-900}
      AUTH_RATE_LIMIT_BLOCK_SECONDS: ${AUTH_RATE_LIMIT_BLOCK_SECONDS:-900}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-${AUTH_BOOTSTRAP_ADMIN_ENABLED:-false}}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:-${AUTH_BOOTSTRAP_TEST_USERS_PASSWORD:-${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}}}
      AUTH_BOOTSTRAP_UPDATE_EXISTING_USERS: ${AUTH_BOOTSTRAP_UPDATE_EXISTING_USERS:-false}
      AUTH_BOOTSTRAP_ADMIN_ENABLED: ${AUTH_BOOTSTRAP_ADMIN_ENABLED:-false}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@autosalon.local}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      AUTH_BOOTSTRAP_TEST_USERS_ENABLED: ${AUTH_BOOTSTRAP_TEST_USERS_ENABLED:-false}
      AUTH_BOOTSTRAP_TEST_USERS_PASSWORD: ${AUTH_BOOTSTRAP_TEST_USERS_PASSWORD:-${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}}
      AUTH_BOOTSTRAP_USER_EMAIL: ${AUTH_BOOTSTRAP_USER_EMAIL:-user@autosalon.local}
      AUTH_BOOTSTRAP_MANAGER_EMAIL: ${AUTH_BOOTSTRAP_MANAGER_EMAIL:-manager@autosalon.local}
      AUTH_BOOTSTRAP_WAREHOUSE_EMAIL: ${AUTH_BOOTSTRAP_WAREHOUSE_EMAIL:-warehouse@autosalon.local}
      AUTH_TRUSTED_PROXY_USE_FORWARDED_FOR: ${AUTH_TRUSTED_PROXY_USE_FORWARDED_FOR:-false}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-localhost}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      STORAGE_GRPC_HOST: storage-service
      STORAGE_GRPC_PORT: 9090
      STORAGE_GRPC_TIMEOUT_MILLIS: 2000
      CART_GRPC_HOST: cart-service
      CART_GRPC_PORT: 9091
      CART_GRPC_TIMEOUT_MILLIS: 2000
      GRPC_SERVER_PORT: 9094
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      order-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      cart-service:
        condition: service_healthy

  payment-service:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: payment-service
    environment:
      <<: *payment-env
      SERVER_PORT: 8084
      POSTGRESQL_HOST: payment-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: payment_service
      DB_USER: postgres
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?Set PAYMENT_DB_PASSWORD}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYMENT_CURRENCY: ${PAYMENT_CURRENCY:-vnd}
      PAYMENT_CURRENCY_DECIMAL_PLACES: ${PAYMENT_CURRENCY_DECIMAL_PLACES:-0}
      PAYMENT_DEPOSIT_PERCENT: ${PAYMENT_DEPOSIT_PERCENT:-10}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ORDER_GRPC_HOST: order-service
      ORDER_GRPC_PORT: 9094
      ORDER_GRPC_TIMEOUT_MILLIS: 2000
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      payment-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      order-service:
        condition: service_healthy

  notification-service:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: notification-service
    environment:
      <<: *notification-env
      SERVER_PORT: 8085
      POSTGRESQL_HOST: notification-postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: notification_service
      DB_USER: postgres
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?Set NOTIFICATION_DB_PASSWORD}
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      notification-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  api-gateway:
    build:
      <<: *spring-build
      args:
        SERVICE_MODULE: api-gateway
    environment:
      <<: *gateway-env
      SERVER_PORT: 8082
      ORDER_SERVICE_URL: http://order-service:8080
      STORAGE_SERVICE_URL: http://storage-service:8081
      CART_SERVICE_URL: http://cart-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ORDER_SERVICE_HEALTH_URL: http://order-service:8080/actuator/health
      STORAGE_SERVICE_HEALTH_URL: http://storage-service:8081/actuator/health
      CART_SERVICE_HEALTH_URL: http://cart-service:8083/actuator/health
      PAYMENT_SERVICE_HEALTH_URL: http://payment-service:8084/actuator/health
      NOTIFICATION_SERVICE_HEALTH_URL: http://notification-service:8085/actuator/health
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GATEWAY_RATE_LIMIT_REPLENISH_RATE: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:-20}
      GATEWAY_RATE_LIMIT_BURST_CAPACITY: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:-40}
    healthcheck:
      <<: *spring-healthcheck
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
    depends_on:
      redis:
        condition: service_healthy
      order-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

volumes:
  order_service_data:
  storage_service_data:
  cart_service_data:
  payment_service_data:
  notification_service_data:
  minio_data:
