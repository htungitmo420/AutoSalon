name: CodeQL

on:
  push:
    branches:
      - master
      - web-client
  pull_request:
    branches:
      - master
      - web-client
  schedule:
    - cron: "41 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-web-client:
    name: Detect web-client
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.detect.outputs.exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect web-client workspace
        id: detect
        shell: bash
        run: |
          if [ -f web-client/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  analyze-backend:
    name: Analyze backend (Java)
    if: github.ref_name == 'master' || github.base_ref == 'master' || github.event_name == 'schedule'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Build backend for CodeQL
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean classes -x test -x integrationTest

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  analyze-web-client:
    name: Analyze web-client (JavaScript/TypeScript)
    needs: detect-web-client
    if: >
      needs.detect-web-client.outputs.exists == 'true' &&
      (
        github.ref_name == 'web-client' ||
        github.ref_name == 'master' ||
        github.base_ref == 'web-client' ||
        github.base_ref == 'master' ||
        github.event_name == 'schedule'
      )
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-client/package-lock.json

      - name: Install web-client dependencies
        working-directory: web-client
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
